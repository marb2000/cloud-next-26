<div class="h-screen w-screen flex items-center justify-center text-slate-100">
  <div class="p-8 bg-slate-800 rounded-xl shadow-2xl max-w-sm w-full border border-slate-700">
    <div class="text-center mb-8 flex flex-col items-center">
      <img src="logo.png" alt="MemoTattoo Logo"
        class="h-20 w-20 object-contain drop-shadow-[0_0_15px_rgba(168,85,247,0.5)] mb-4" />
      <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-teal-400">
        MemoTattoo
        Admin</h1>
      <p class="text-slate-400 text-sm mt-2">Authorized Personnel Only</p>

      <div
        class="mt-4 p-3 bg-teal-500/10 border border-teal-500/20 rounded-md text-teal-300 text-xs text-left leading-relaxed">
        <strong>🔒 Login Access:</strong> Only emails registered
        was 'Admins' database are permitted entry.
        <br /><br />
        Try logging in with <strong>admin@memotattoo.com</strong> and password
        <strong>memotattoo123</strong>
      </div>
    </div>

    <form (submit)="onLogin($event)" class="flex flex-col gap-5">
      <div>
        <label for="email" class="block mb-1.5 text-sm font-medium text-slate-300">Email Address</label>
        <input id="email" name="email" type="email" required
          class="w-full px-4 py-2.5 bg-slate-900 rounded-lg border border-slate-600 focus:border-purple-400 focus:ring-1 focus:ring-purple-400 transition-all outline-none placeholder-slate-500"
          placeholder="admin@memotattoo.com" />
      </div>
      <div>
        <label for="password" class="block mb-1.5 text-sm font-medium text-slate-300">Password</label>
        <input id="password" name="password" type="password" required
          class="w-full px-4 py-2.5 bg-slate-900 rounded-lg border border-slate-600 focus:border-purple-400 focus:ring-1 focus:ring-purple-400 transition-all outline-none"
          placeholder="••••••••" />
      </div>

      <button type="submit" [disabled]="loading()"
        class="mt-2 w-full py-3 bg-gradient-to-r from-purple-600 to-teal-500 hover:from-purple-500 hover:to-teal-400 rounded-lg font-bold shadow-lg shadow-purple-500/20 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
        @if (loading()) {
        Authenticating...
        } @else {
        Access Control Panel
        }
      </button>

      @if(error()) {
      <div class="p-3 bg-red-500/10 border border-red-500/50 rounded-lg text-red-400 text-sm text-center">
        {{ error() }}
      </div>
      }
    </form>
  </div>
</div>
